<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Anonymous Chat · CodexZendrx</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0b0e1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: #121620;
    }
    .header {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .room-code {
      background: #2a2f45;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-family: monospace;
      cursor: pointer;
    }
    .user-name {
      background: #667eea33;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .change-name-btn {
      background: #3a3f5a;
      border: none;
      color: white;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .users-toggle {
      background: #667eea33;
      border: none;
      color: white;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.7rem;
    }
    .users-panel {
      position: fixed;
      top: 0;
      right: -280px;
      width: 260px;
      height: 100%;
      background: #1e2235ee;
      backdrop-filter: blur(24px);
      transition: right 0.2s;
      z-index: 20;
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.2);
    }
    .users-panel.open { right: 0; }
    .users-header {
      padding: 1rem;
      background: #00000066;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .users-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem;
      margin: 0.3rem 0;
      background: rgba(255,255,255,0.05);
      border-radius: 1rem;
    }
    .user-info { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .user-color { width: 10px; height: 10px; border-radius: 50%; }
    .admin-badge { background: gold; color: black; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 0.6rem; }
    .muted-badge { background: #888; color: white; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 0.6rem; }
    .action-buttons { display: flex; gap: 0.3rem; }
    .kick-btn, .mute-btn { background: #e34d4d; border: none; color: white; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.65rem; }
    .mute-btn { background: #f39c12; }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .message { animation: fadeIn 0.15s; }
    .message-header { display: flex; gap: 0.6rem; align-items: baseline; flex-wrap: wrap; margin-bottom: 0.2rem; }
    .message-sender { font-weight: bold; font-size: 0.85rem; }
    .message-time { font-size: 0.6rem; color: #aaa; }
    .message-content {
      background: #2a2f45;
      padding: 0.5rem 0.8rem;
      border-radius: 1.2rem;
      display: inline-block;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 0.9rem;
      color: #eee;
    }
    .mention { background: #667eea99; border-radius: 0.5rem; padding: 0.1rem 0.2rem; font-weight: bold; }
    .system-message { text-align: center; font-size: 0.7rem; color: #aaa; font-style: italic; margin: 0.3rem 0; }
    .image-message { max-width: 200px; border-radius: 1rem; cursor: pointer; margin-top: 0.3rem; }
    .view-once-tag { font-size: 0.65rem; color: #ffaa44; margin-left: 0.5rem; }
    .input-bar {
      background: #0e111b;
      padding: 0.7rem;
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      align-items: center;
    }
    #messageInput {
      flex: 1;
      background: #2a2f45;
      border: none;
      padding: 0.7rem 1rem;
      border-radius: 2rem;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .attach-btn { background: #3a3f5a; padding: 0.6rem 0.9rem; font-size: 1.1rem; }
    .typing-indicator { font-size: 0.65rem; padding: 0.2rem 1rem; color: #aaa; min-height: 1.6rem; }
    .toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      z-index: 40;
      animation: fadeOut 3s forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    .mention-suggestions {
      position: fixed;
      background: #1e2235;
      border-radius: 1rem;
      padding: 0.4rem;
      max-height: 150px;
      overflow-y: auto;
      z-index: 30;
      width: 180px;
      box-shadow: 0 4px 12px black;
    }
    .mention-suggestions div { padding: 0.4rem; cursor: pointer; border-radius: 0.6rem; }
    .mention-suggestions div:hover { background: #667eea55; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <div class="room-code" id="roomCode">📋 CODEXZENDRXGREAT</div>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <span class="user-name" id="myNameSpan"></span>
      <button class="change-name-btn" id="changeNameBtn">✏️</button>
      <button class="users-toggle" id="usersToggleBtn">👥</button>
    </div>
  </div>
  <div class="messages-area" id="messagesContainer"></div>
  <div class="typing-indicator" id="typingIndicator"></div>
  <div class="input-bar">
    <button class="attach-btn" id="attachBtn">📷</button>
    <input type="text" id="messageInput" placeholder="Type @ to mention..." autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>
</div>

<div class="users-panel" id="usersPanel">
  <div class="users-header">
    <span>📡 Online · <span id="userCount">0</span></span>
    <button id="closePanelBtn" style="background: none; padding: 0.2rem 0.6rem;">✕</button>
  </div>
  <div class="users-list" id="usersList"></div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
  // ----- CONFIG -----
  const SOCKET_URL = 'https://class-anon.onrender.com'; // CHANGE TO YOUR RENDER URL
  const ROOM_CODE = 'CODEXZENDRXGREAT';
  const ADMIN_KEY = 'zendrxmani';

  let socket = null;
  let currentUser = null;
  let isAdmin = false;
  let onlineUsers = [];

  // ----- Helper: show toast notification -----
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ----- Load chosen name from localStorage (from index) -----
  function getChosenName() {
    return localStorage.getItem('chat_chosen_name') || '';
  }

  // ----- Clear old identity and reconnect with new name -----
  function changeName() {
    const newName = prompt('Enter new nickname (letters, numbers, spaces only, 2-20 chars):', currentUser?.name || '');
    if (!newName) return;
    const allowed = /^[a-zA-Z0-9 ]+$/;
    if (!allowed.test(newName) || newName.length < 2 || newName.length > 20) {
      alert('Invalid name. Use 2-20 letters, numbers, spaces. No emoji.');
      return;
    }
    // Clear stored identity and chosen name, then reload page to rejoin with new name
    localStorage.removeItem('chat_name');
    localStorage.removeItem('chat_color');
    localStorage.setItem('chat_chosen_name', newName);
    window.location.reload();
  }

  // ----- JOIN CHAT -----
  function joinChat(adminCode) {
    if (!socket) {
      socket = io(SOCKET_URL, { transports: ['websocket'] });
      attachSocketEvents();
    }
    const chosenName = getChosenName();
    const saved = { name: localStorage.getItem('chat_name'), color: localStorage.getItem('chat_color') };
    socket.emit('join-room', {
      roomCode: ROOM_CODE,
      adminCode: adminCode,
      chosenName: chosenName,
      savedName: saved.name || null,
      savedColor: saved.color || null
    });
  }

  // ----- UI RENDERING -----
  function addMessageToUI(msg, isSystem = false) {
    const container = document.getElementById('messagesContainer');
    if (!container) return;
    const div = document.createElement('div');
    div.className = 'message';

    if (isSystem) {
      div.className = 'system-message';
      div.textContent = msg;
    } else if (msg.type === 'image') {
      const isViewOnce = msg.viewOnce;
      const alreadyViewed = msg.viewedBy && msg.viewedBy.includes(currentUser?.id);
      div.innerHTML = `
        <div class="message-header">
          <span class="message-sender" style="color:${msg.color}">${escapeHtml(msg.sender)}</span>
          <span class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
          ${msg.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}
          ${isViewOnce ? '<span class="view-once-tag">📸 View once</span>' : ''}
        </div>
        <div class="image-container" id="img-${msg.id}">
          ${(!isViewOnce || !alreadyViewed) && msg.imageData ? `<img src="${msg.imageData}" class="image-message">` : '<em>View-once image (already viewed or expired)</em>'}
        </div>
      `;
      if (isViewOnce && !alreadyViewed && msg.imageData) {
        const img = div.querySelector('.image-message');
        if (img) {
          img.onclick = () => {
            socket.emit('view-image', msg.id);
            const containerDiv = div.querySelector('.image-container');
            containerDiv.innerHTML = '<em>Image viewed (will disappear after all see)</em>';
          };
        }
      }
    } else {
      let content = escapeHtml(msg.content);
      if (msg.mentions && msg.mentions.length) {
        msg.mentions.forEach(mention => {
          const regex = new RegExp(`@${escapeRegex(mention)}`, 'gi');
          content = content.replace(regex, `<span class="mention">@$&</span>`);
        });
      }
      div.innerHTML = `
        <div class="message-header">
          <span class="message-sender" style="color:${msg.color}">${escapeHtml(msg.sender)}</span>
          <span class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
          ${msg.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}
        </div>
        <div class="message-content">${content}</div>
      `;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function updateUsersList(users) {
    const container = document.getElementById('usersList');
    const countSpan = document.getElementById('userCount');
    if (!container) return;
    countSpan.innerText = users.length;
    container.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `
        <div class="user-info">
          <div class="user-color" style="background:${u.color}"></div>
          <span>${escapeHtml(u.name)}</span>
          ${u.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}
          ${u.isMuted ? '<span class="muted-badge">muted</span>' : ''}
        </div>
        <div class="action-buttons">
          ${isAdmin && !u.isAdmin ? `<button class="mute-btn" data-id="${u.id}">${u.isMuted ? 'Unmute' : 'Mute'}</button>` : ''}
          ${isAdmin && !u.isAdmin ? `<button class="kick-btn" data-id="${u.id}">Kick</button>` : ''}
        </div>
      `;
      container.appendChild(div);
    });
    document.querySelectorAll('.mute-btn').forEach(btn => btn.onclick = () => socket.emit('mute-user', btn.dataset.id));
    document.querySelectorAll('.kick-btn').forEach(btn => btn.onclick = () => { if(confirm('Kick user?')) socket.emit('kick-user', btn.dataset.id); });
  }

  function addSystemMsg(text) { addMessageToUI(text, true); }

  // ----- MENTION AUTOCOMPLETE (mobile friendly) -----
  let mentionPopup = null;
  function setupMentionInput() {
    const input = document.getElementById('messageInput');
    input.addEventListener('input', (e) => {
      const val = input.value;
      const cursorPos = input.selectionStart;
      const beforeCursor = val.slice(0, cursorPos);
      const lastAtIndex = beforeCursor.lastIndexOf('@');
      if (lastAtIndex !== -1 && (lastAtIndex === 0 || beforeCursor[lastAtIndex-1] === ' ')) {
        const query = beforeCursor.slice(lastAtIndex+1).toLowerCase();
        const matches = onlineUsers.filter(u => u.name.toLowerCase().startsWith(query) && u.id !== currentUser?.id);
        showMentionSuggestions(matches);
      } else {
        hideMentionSuggestions();
      }
    });
    input.addEventListener('blur', () => setTimeout(hideMentionSuggestions, 200));
  }

  function showMentionSuggestions(users) {
    hideMentionSuggestions();
    if (!users.length) return;
    const popup = document.createElement('div');
    popup.className = 'mention-suggestions';
    users.forEach(u => {
      const item = document.createElement('div');
      item.textContent = u.name;
      item.onmousedown = (e) => {
        e.preventDefault();
        const input = document.getElementById('messageInput');
        const val = input.value;
        const atPos = val.lastIndexOf('@', input.selectionStart);
        const before = val.slice(0, atPos);
        const after = val.slice(val.indexOf('@', atPos) + 1).replace(/^[a-zA-Z0-9 ]*/, '');
        input.value = before + '@' + u.name + ' ' + after;
        input.focus();
        popup.remove();
      };
      popup.appendChild(item);
    });
    const rect = input.getBoundingClientRect();
    popup.style.position = 'fixed';
    popup.style.bottom = rect.height + 10 + 'px';
    popup.style.left = rect.left + 'px';
    document.body.appendChild(popup);
    mentionPopup = popup;
  }
  function hideMentionSuggestions() { if (mentionPopup) mentionPopup.remove(); mentionPopup = null; }

  // ----- SOCKET EVENTS -----
  function attachSocketEvents() {
    socket.on('join-success', (data) => {
      currentUser = data.user;
      isAdmin = data.user.isAdmin;
      localStorage.setItem('chat_name', currentUser.name);
      localStorage.setItem('chat_color', currentUser.color);
      // Clear the temporary chosen name so next reload doesn't reuse it unless index provides new
      localStorage.removeItem('chat_chosen_name');
      document.getElementById('myNameSpan').innerText = currentUser.name;
      document.getElementById('messagesContainer').innerHTML = '';
      data.history.forEach(msg => addMessageToUI(msg));
      updateUsersList(data.users);
      onlineUsers = data.users;
      addSystemMsg(`You joined as ${currentUser.name}`);
      if (isAdmin) addSystemMsg('🔧 You are an admin. Tap users panel to mute/kick.');
    });

    socket.on('user-list', (users) => { onlineUsers = users; updateUsersList(users); });
    socket.on('new-message', (msg) => addMessageToUI(msg));
    socket.on('user-joined', (data) => { addSystemMsg(`✨ ${data.user.name} joined`); updateUsersList(data.users); });
    socket.on('user-left', (data) => { addSystemMsg(`👋 ${data.userName} left`); });
    socket.on('user-muted', (data) => { addSystemMsg(`${data.userName} is now ${data.isMuted ? 'muted' : 'unmuted'}`); });
    socket.on('user-kicked', (data) => { addSystemMsg(`⚠️ ${data.userName} was kicked`); if(data.userId === currentUser?.id) setTimeout(()=> window.location.reload(), 2000); });
    socket.on('user-typing', (data) => { document.getElementById('typingIndicator').innerText = data.isTyping ? `${data.name} typing...` : ''; });
    socket.on('error', (err) => alert(err));
    socket.on('kicked', () => { alert('You were kicked'); localStorage.clear(); window.location.reload(); });
    socket.on('mute-status', (data) => { alert(data.isMuted ? 'You have been muted' : 'You have been unmuted'); });
    socket.on('image-expired', (data) => {
      const imgContainer = document.querySelector(`#img-${data.messageId}`);
      if (imgContainer) imgContainer.innerHTML = '<em>Image expired (all viewed)</em>';
    });
    socket.on('mention-notification', (data) => {
      showToast(`🔔 ${data.from} mentioned you: "${data.messagePreview}"`);
    });
  }

  // ----- SEND TEXT & IMAGE -----
  function sendTextMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;
    const mentionRegex = /@([a-zA-Z0-9 ]+)/g;
    let match;
    const mentions = [];
    while ((match = mentionRegex.exec(content)) !== null) {
      mentions.push(match[1].trim());
    }
    socket.emit('send-message', { type: 'text', content, mentions });
    input.value = '';
    hideMentionSuggestions();
  }

  function uploadImage() {
    const viewOnce = confirm('Send as view-once? (image will disappear after everyone sees it)');
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        socket.emit('send-message', { type: 'image', imageData: ev.target.result, viewOnce, mentions: [] });
      };
      reader.readAsDataURL(file);
    };
    fileInput.click();
  }

  // ----- INIT -----
  window.onload = () => {
    const adminCode = prompt('Enter admin code if you have one (otherwise leave empty):', '');
    joinChat(adminCode);

    document.getElementById('sendBtn').onclick = sendTextMessage;
    document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendTextMessage(); };
    document.getElementById('attachBtn').onclick = uploadImage;
    document.getElementById('roomCode').onclick = () => { navigator.clipboard.writeText(ROOM_CODE); alert('Room code copied'); };
    document.getElementById('changeNameBtn').onclick = changeName;
    const panel = document.getElementById('usersPanel');
    document.getElementById('usersToggleBtn').onclick = () => panel.classList.toggle('open');
    document.getElementById('closePanelBtn').onclick = () => panel.classList.remove('open');
    setupMentionInput();
  };

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
</script>
</body>
</html>
