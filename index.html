<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Anonymous Chat · CodexZendrxGreat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #1a1e2c 0%, #2a2f45 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    /* Main container */
    .chat-app {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
      width: 100%;
      max-width: 1400px;
      height: 90vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: rgba(30, 34, 48, 0.8);
      backdrop-filter: blur(4px);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .sidebar-header h2 {
      font-size: 1.4rem;
      letter-spacing: -0.5px;
    }

    .sidebar-header p {
      font-size: 0.7rem;
      opacity: 0.8;
      margin-top: 0.25rem;
    }

    .room-info {
      padding: 1rem;
      background: rgba(0,0,0,0.2);
      margin: 1rem;
      border-radius: 1rem;
      text-align: center;
    }

    .room-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
    }

    .room-code {
      font-family: monospace;
      font-weight: bold;
      font-size: 0.9rem;
      background: #00000055;
      padding: 0.5rem;
      border-radius: 0.8rem;
      margin-top: 0.5rem;
      word-break: break-all;
      cursor: pointer;
      transition: 0.2s;
    }

    .room-code:hover {
      background: #000000aa;
    }

    .users-header {
      padding: 1rem 1rem 0.5rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #ccc;
      letter-spacing: 0.5px;
    }

    .users-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 0.5rem 1rem 0.5rem;
    }

    .user-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.8rem;
      margin: 0.3rem 0;
      background: rgba(255,255,255,0.05);
      border-radius: 1rem;
      transition: 0.1s;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .user-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
    }

    .user-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: #eee;
    }

    .admin-badge {
      background: #f5b042;
      color: #1e1e2a;
      font-size: 0.65rem;
      font-weight: bold;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      margin-left: 0.5rem;
    }

    .kick-btn {
      background: #e34d4d;
      border: none;
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      cursor: pointer;
      transition: 0.1s;
    }

    .kick-btn:hover {
      background: #c03939;
      transform: scale(1.02);
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(20, 22, 36, 0.6);
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .message {
      animation: fadeInUp 0.2s ease;
    }

    .message-header {
      display: flex;
      align-items: baseline;
      gap: 0.7rem;
      margin-bottom: 0.2rem;
    }

    .message-sender {
      font-weight: 700;
      font-size: 0.85rem;
    }

    .message-time {
      font-size: 0.65rem;
      color: #aaa;
    }

    .message-content {
      background: rgba(255,255,255,0.05);
      padding: 0.5rem 0.8rem;
      border-radius: 1rem;
      display: inline-block;
      max-width: 80%;
      word-wrap: break-word;
      font-size: 0.9rem;
      color: #f0f0f0;
    }

    .system-message {
      text-align: center;
      font-size: 0.75rem;
      color: #aaa;
      font-style: italic;
      margin: 0.5rem 0;
    }

    .typing-indicator {
      padding: 0.5rem 1.5rem;
      font-size: 0.7rem;
      color: #aaa;
      font-style: italic;
      min-height: 2rem;
    }

    .input-wrapper {
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      display: flex;
      gap: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    #messageInput {
      flex: 1;
      background: #2a2f45;
      border: none;
      padding: 0.8rem 1rem;
      border-radius: 2rem;
      color: white;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    #messageInput:focus {
      background: #3a3f5a;
      box-shadow: 0 0 0 2px #667eea;
    }

    #sendButton {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      padding: 0 1.5rem;
      border-radius: 2rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    #sendButton:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
    }

    /* Join screen */
    .join-screen {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 3rem 2rem;
      text-align: center;
      width: 100%;
      max-width: 500px;
      margin: auto;
    }

    .join-screen h1 {
      color: white;
      margin-bottom: 0.5rem;
    }

    .join-screen p {
      color: #ccc;
      margin-bottom: 1.5rem;
    }

    .room-badge {
      background: #2a2f45;
      padding: 0.8rem;
      border-radius: 1rem;
      font-family: monospace;
      font-weight: bold;
      margin: 1rem 0;
      color: #ffd966;
    }

    .join-screen input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.5rem 0;
      background: #1e1e2a;
      border: 1px solid #444;
      border-radius: 2rem;
      color: white;
      text-align: center;
    }

    .join-screen button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      padding: 0.8rem 2rem;
      margin: 0.5rem;
      border-radius: 2rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
      width: 80%;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1e2a;
    }
    ::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 5px;
    }

    @media (max-width: 700px) {
      .sidebar {
        width: 220px;
      }
      .user-name {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
  // ---------- CONFIG ----------
  const SOCKET_URL = 'https://class-anon.onrender.com'; // your Render backend
  const FIXED_ROOM = 'CODEXZENDRXGREAT';
  const ADMIN_KEY = 'zendrxmani';

  let socket = null;
  let currentUser = null;
  let isAdmin = false;

  // ---------- HELPER: SAVE/LOAD FROM LOCALSTORAGE (reload resilience) ----------
  function saveIdentity(name, color) {
    localStorage.setItem('chat_name', name);
    localStorage.setItem('chat_color', color);
  }

  function loadIdentity() {
    return {
      name: localStorage.getItem('chat_name'),
      color: localStorage.getItem('chat_color')
    };
  }

  function clearIdentity() {
    localStorage.removeItem('chat_name');
    localStorage.removeItem('chat_color');
  }

  // ---------- RENDER JOIN SCREEN ----------
  function renderJoinScreen() {
    document.getElementById('root').innerHTML = `
      <div class="join-screen">
        <h1>✨ CodexZendrxGreat</h1>
        <p>anonymous · secure · ephemeral</p>
        <div class="room-badge">🔒 Room: ${FIXED_ROOM}</div>
        <input type="text" id="adminCodeInput" placeholder="Admin code (optional)">
        <button id="joinBtn">Join chat</button>
      </div>
    `;
    document.getElementById('joinBtn').onclick = () => {
      const adminCode = document.getElementById('adminCodeInput').value;
      joinRoom(adminCode);
    };
  }

  // ---------- JOIN (or REJOIN) ----------
  function joinRoom(adminCode) {
    if (!socket) {
      socket = io(SOCKET_URL, { transports: ['websocket'] });
      attachSocketEvents();
    }
    const saved = loadIdentity();
    socket.emit('join-room', {
      roomCode: FIXED_ROOM,
      adminCode: adminCode,
      savedName: saved.name || null,
      savedColor: saved.color || null
    });
  }

  // ---------- MAIN CHAT UI ----------
  function renderChatUI() {
    document.getElementById('root').innerHTML = `
      <div class="chat-app">
        <div class="sidebar">
          <div class="sidebar-header">
            <h2>✨ CodexZendrx</h2>
            <p>anonymous whispers</p>
          </div>
          <div class="room-info">
            <div class="room-label">ROOM CODE</div>
            <div class="room-code" id="roomCodeCopy">${FIXED_ROOM}</div>
          </div>
          <div class="users-header">📡 online · <span id="userCount">0</span></div>
          <div class="users-list" id="usersList"></div>
        </div>
        <div class="chat-area">
          <div class="messages-container" id="messagesContainer"></div>
          <div class="typing-indicator" id="typingIndicator"></div>
          <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendButton">Send</button>
          </div>
        </div>
      </div>
    `;

    // Copy room code to clipboard
    document.getElementById('roomCodeCopy').onclick = () => {
      navigator.clipboard.writeText(FIXED_ROOM);
      alert('Room code copied!');
    };

    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendButton');

    sendBtn.onclick = () => sendMessage();
    input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    let typingTimeout;
    input.oninput = () => {
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('typing', false), 1000);
    };
  }

  function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;
    socket.emit('send-message', { content });
    input.value = '';
  }

  // ---------- MESSAGE RENDERING ----------
  function addMessageToUI(message, isSystem = false) {
    const container = document.getElementById('messagesContainer');
    if (!container) return;
    const div = document.createElement('div');
    if (isSystem) {
      div.className = 'system-message';
      div.textContent = message;
    } else {
      div.className = 'message';
      div.innerHTML = `
        <div class="message-header">
          <span class="message-sender" style="color: ${message.color}">${escapeHtml(message.sender)}</span>
          <span class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</span>
          ${message.isAdmin ? '<span class="admin-badge" style="background:#f5b042; margin-left:0;">ADMIN</span>' : ''}
        </div>
        <div class="message-content">${escapeHtml(message.content)}</div>
      `;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function updateUserListUI(users) {
    const container = document.getElementById('usersList');
    const countSpan = document.getElementById('userCount');
    if (!container) return;
    if (countSpan) countSpan.innerText = users.length;
    container.innerHTML = '';
    users.forEach(user => {
      const userDiv = document.createElement('div');
      userDiv.className = 'user-item';
      userDiv.innerHTML = `
        <div class="user-info">
          <div class="user-color" style="background: ${user.color}"></div>
          <span class="user-name">${escapeHtml(user.name)}</span>
          ${user.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}
        </div>
        ${isAdmin && !user.isAdmin ? `<button class="kick-btn" data-id="${user.id}">Kick</button>` : ''}
      `;
      container.appendChild(userDiv);
    });
    // attach kick events (delegation)
    document.querySelectorAll('.kick-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const userId = btn.getAttribute('data-id');
        if (confirm('Kick this user?')) socket.emit('kick-user', userId);
      };
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- SOCKET EVENT HANDLERS ----------
  function attachSocketEvents() {
    socket.on('join-success', (data) => {
      currentUser = data.user;
      isAdmin = data.user.isAdmin;
      // save name & color for reload
      saveIdentity(currentUser.name, currentUser.color);

      renderChatUI();
      // load chat history
      if (data.history && data.history.length) {
        data.history.forEach(msg => addMessageToUI(msg));
      }
      updateUserListUI(data.users);
      addMessageToUI(`You joined as ${currentUser.name}`, true);
      if (isAdmin) addMessageToUI('🔧 You are an admin. Click Kick next to any non-admin user.', true);
    });

    socket.on('user-list', (users) => {
      updateUserListUI(users);
    });

    socket.on('new-message', (msg) => {
      addMessageToUI(msg);
    });

    socket.on('user-joined', (data) => {
      addMessageToUI(`✨ ${data.user.name} joined the chat`, true);
      updateUserListUI(data.users);
    });

    socket.on('user-left', (data) => {
      addMessageToUI(`👋 ${data.userName} left the chat`, true);
      updateUserListUI(data.users);
    });

    socket.on('user-kicked', (data) => {
      addMessageToUI(`⚠️ ${data.userName} was kicked by an admin`, true);
      updateUserListUI(data.users);
      if (data.userId === currentUser?.id) {
        alert('You were kicked from the room');
        clearIdentity();
        location.reload();
      }
    });

    socket.on('user-typing', (data) => {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.textContent = data.isTyping ? `${data.name} is typing...` : '';
      }
    });

    socket.on('error', (err) => {
      alert('Error: ' + err);
    });

    socket.on('kicked', (data) => {
      alert(data.message);
      clearIdentity();
      location.reload();
    });
  }

  // ---------- START ----------
  renderJoinScreen();
</script>
</body>
</html>
