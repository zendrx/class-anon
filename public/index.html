<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat - CodexZendrxGreat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            background: #667eea;
            color: white;
        }
        .room-info {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        .room-code {
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            background: #e0e0e0;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            word-break: break-all;
            margin-top: 8px;
        }
        .users-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .user-item {
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border: 1px solid #e0e0e0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .admin-badge {
            background: #ffd700;
            color: #333;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }
        .kick-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
        }
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }
        .message-header {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            align-items: baseline;
        }
        .message-sender {
            font-weight: bold;
            font-size: 14px;
        }
        .message-time {
            font-size: 10px;
            color: #999;
        }
        .message-content {
            color: #333;
            word-wrap: break-word;
            font-size: 14px;
        }
        .system-message {
            text-align: center;
            color: #999;
            font-style: italic;
            margin: 10px 0;
            font-size: 12px;
        }
        .typing-indicator {
            padding: 10px 20px;
            color: #999;
            font-style: italic;
            font-size: 12px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }
        #sendButton {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .join-screen {
            text-align: center;
            padding: 40px;
        }
        .join-screen input {
            padding: 12px;
            margin: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            width: 250px;
            font-size: 14px;
        }
        .join-screen button {
            padding: 12px 24px;
            margin: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Update this to your Render URL
        const SOCKET_URL = 'https://class-anon.onrender.com';
        const socket = io(SOCKET_URL, {
            transports: ['websocket'],
            cors: { origin: "*" }
        });
        
        let currentUser = null;
        let isAdmin = false;

        function showJoinScreen() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="join-screen">
                        <h1>✨ CodexZendrxGreat Chat</h1>
                        <p>Anonymous & Secure</p>
                        <div class="room-info" style="background:#f0f0f0;border-radius:10px;margin:20px 0;padding:15px;">
                            <strong>Room Code:</strong> CODEXZENDRXGREAT
                        </div>
                        <input type="text" id="adminCode" placeholder="Admin code (optional)">
                        <br>
                        <button onclick="joinChat()">Join Chat</button>
                    </div>
                </div>
            `;
        }

        function showChatRoom() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <h3>✨ CodexZendrxGreat</h3>
                        </div>
                        <div class="room-info">
                            <div>Room Code</div>
                            <div class="room-code">CODEXZENDRXGREAT</div>
                        </div>
                        <div class="users-list">
                            <h4>Online Users</h4>
                            <div id="usersList"></div>
                        </div>
                    </div>
                    <div class="chat">
                        <div class="messages" id="messages"></div>
                        <div class="typing-indicator" id="typingIndicator"></div>
                        <div class="input-area">
                            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                            <button id="sendButton" onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            `;
            
            let typingTimeout;
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('input', () => {
                    socket.emit('typing', true);
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        socket.emit('typing', false);
                    }, 1000);
                });
            }
        }

        window.joinChat = () => {
            const adminCode = document.getElementById('adminCode').value;
            socket.emit('join-room', { 
                roomCode: 'CODEXZENDRXGREAT', 
                adminCode: adminCode 
            });
        };

        window.sendMessage = () => {
            const input = document.getElementById('messageInput');
            if (input && input.value.trim()) {
                socket.emit('send-message', { content: input.value.trim() });
                input.value = '';
            }
        };

        window.handleKeyPress = (event) => {
            if (event.key === 'Enter') sendMessage();
        };

        window.kickUser = (userId) => {
            socket.emit('kick-user', userId);
        };

        function addMessage(message, isSystem = false) {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            
            const messageDiv = document.createElement('div');
            if (isSystem) {
                messageDiv.className = 'system-message';
                messageDiv.textContent = message;
            } else {
                messageDiv.className = 'message';
                messageDiv.innerHTML = `
                    <div class="message-header">
                        <span class="message-sender" style="color: ${message.color}">${escapeHtml(message.sender)}</span>
                        <span class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="message-content">${escapeHtml(message.content)}</div>
                `;
            }
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateUsersList(users) {
            const usersDiv = document.getElementById('usersList');
            if (!usersDiv) return;
            
            usersDiv.innerHTML = '';
            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'user-item';
                userDiv.innerHTML = `
                    <div class="user-info">
                        <div class="user-color" style="background: ${user.color}"></div>
                        <span>${escapeHtml(user.name)}</span>
                        ${user.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}
                    </div>
                    ${isAdmin && !user.isAdmin ? `<button class="kick-btn" onclick="kickUser('${user.id}')">Kick</button>` : ''}
                `;
                usersDiv.appendChild(userDiv);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Socket events
        socket.on('join-success', (data) => {
            currentUser = data.user;
            isAdmin = data.isAdmin;
            showChatRoom();
            updateUsersList(data.users);
            addMessage(`You joined as ${data.user.name}`, true);
            if (data.isAdmin) addMessage('🔧 You are the ADMIN. Click Kick to remove users.', true);
        });

        socket.on('chat-history', (messages) => {
            messages.forEach(msg => addMessage(msg));
        });

        socket.on('new-message', (message) => addMessage(message));
        
        socket.on('user-list-update', (users) => updateUsersList(users));
        
        socket.on('user-joined', (data) => {
            addMessage(`✨ ${data.user.name} joined the chat`, true);
            updateUsersList(data.users);
        });
        
        socket.on('user-left', (data) => {
            addMessage(`👋 ${data.user.name} left the chat`, true);
            updateUsersList(data.users);
        });
        
        socket.on('user-kicked', (data) => {
            addMessage(`⚠️ ${data.userName} was kicked by admin`, true);
            updateUsersList(data.users);
        });
        
        socket.on('user-typing', (data) => {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.textContent = data.isTyping ? `${data.name} is typing...` : '';
            }
        });
        
        socket.on('error', (error) => alert(error));
        
        socket.on('kicked', (data) => {
            alert(data.message);
            location.reload();
        });

        showJoinScreen();
    </script>
</body>
</html>
